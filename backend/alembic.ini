[alembic]
script_location = alembic
prepend_sys_path = .

# The sqlalchemy.url is overridden in env.py to use the async driver from config.
# This sync fallback is only used if env.py fails to set it.
sqlalchemy.url = postgresql://compshere:compshere@localhost:5433/compshere

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
